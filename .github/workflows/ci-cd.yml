# ============================================================
# Experiment 7: CI/CD Pipeline — GitHub Actions
# ============================================================
# Triggers on push to main branch
# Builds Docker image, pushes to Docker Hub, deploys to EC2

name: CI/CD Pipeline — MLOps Student Score Predictor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-student-predictor
  EC2_HOST: ${{ secrets.EC2_HOST }}

jobs:
  # -------------------------------------------------------
  # Job 1: Test
  # -------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Train model
        run: python experiment1_train_model.py

      - name: Start server & run tests
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 3
          python test_api.py
          kill %1

  # -------------------------------------------------------
  # Job 2: Build & Push Docker Image
  # -------------------------------------------------------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Train model (needed for Docker image)
        run: |
          pip install scikit-learn pandas numpy
          python experiment1_train_model.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # -------------------------------------------------------
  # Job 3: Deploy to EC2
  # -------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Stop existing container if running
            docker stop mlops-predictor 2>/dev/null || true
            docker rm mlops-predictor 2>/dev/null || true

            # Run new container
            docker run -d \
              --name mlops-predictor \
              --restart unless-stopped \
              -p 8000:8000 \
              -e API_KEY=${{ secrets.API_KEY }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              ${{ env.DOCKER_IMAGE }}:latest

            # Verify deployment
            sleep 5
            curl -f http://localhost:8000/health || exit 1
            echo "Deployment successful!"
